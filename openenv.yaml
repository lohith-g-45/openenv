openenv:
  name: Intelligent Code Evaluation and Optimization Environment
  version: 1.0.0
  deterministic: false
  scoring:
    min_exclusive: 0.0
    max_exclusive: 1.0
  tasks:
    - id: easy-1
      difficulty: easy
      grader: server.graders:EasyGrader
    - id: medium-1
      difficulty: medium
      grader: server.graders:MediumGrader
    - id: hard-1
      difficulty: hard
      grader: server.graders:HardGrader
  state_schema:
    type: object
    required:
      - code
      - test_results
      - error_type
      - analysis
    properties:
      code:
        type: string
      test_results:
        type: object
        additionalProperties:
          type: string
      error_type:
        type: string
      analysis:
        type: object
        additionalProperties:
          type: string

  action_space:
    - run_tests
    - detect_bug
    - classify_approach
    - analyze_complexity
    - suggest_optimization
    - generate_code

  step_response:
    type: tuple
    items:
      - name: next_state
        schema_ref: '#/openenv/state_schema'
      - name: reward
        type: number
      - name: done
        type: boolean
      - name: info
        type: object
        additionalProperties:
          type: string

tasks:
  - id: easy-1
    difficulty: easy
    grader: server.graders:EasyGrader
  - id: medium-1
    difficulty: medium
    grader: server.graders:MediumGrader
  - id: hard-1
    difficulty: hard
    grader: server.graders:HardGrader

graders:
  EasyGrader:
    module: server.graders
    class: EasyGrader
  MediumGrader:
    module: server.graders
    class: MediumGrader
  HardGrader:
    module: server.graders
    class: HardGrader

scoring:
  min_exclusive: 0.0
  max_exclusive: 1.0

api:
  base_path: /
  endpoints:
    - path: /reset
      method: POST
      request_model: ResetRequest
      response_model: ResetResponse
    - path: /step
      method: POST
      request_model: StepRequest
      response_model: StepResponse
    - path: /state
      method: GET
      request_model: null
      response_model: StateResponse
    - path: /submit
      method: POST
      request_model: SubmitRequest
      response_model: SubmitResponse
    - path: /run
      method: POST
      request_model: RunRequest
      response_model: RunResponse

models:
  ResetRequest:
    type: object
    properties:
      difficulty:
        type: string
        enum: [easy, medium, hard]
        nullable: true
      language:
        type: string
        enum: [python, c, java]

  StateModel:
    type: object
    required: [code, test_results, error_type, analysis]
    properties:
      code:
        type: string
      test_results:
        type: object
        additionalProperties:
          type: string
      error_type:
        type: string
      analysis:
        type: object
        additionalProperties:
          type: string

  ResetResponse:
    type: object
    required: [state, task_id, problem]
    properties:
      state:
        $ref: '#/models/StateModel'
      task_id:
        type: string
      problem:
        type: string

  StepRequest:
    type: object
    required: [action]
    properties:
      action:
        type: string
        enum:
          - run_tests
          - detect_bug
          - classify_approach
          - analyze_complexity
          - suggest_optimization
          - generate_code

  StepResponse:
    type: object
    required: [next_state, reward, done, info]
    properties:
      next_state:
        $ref: '#/models/StateModel'
      reward:
        type: number
      done:
        type: boolean
      info:
        type: object
        additionalProperties:
          type: string

  StateResponse:
    type: object
    required: [state, task_id, problem]
    properties:
      state:
        $ref: '#/models/StateModel'
      task_id:
        type: string
      problem:
        type: string

  SubmitRequest:
    type: object
    required: [code]
    properties:
      code:
        type: string
      language:
        type: string
        enum: [python, c, java]

  SubmitResponse:
    type: object
    required: [result]
    properties:
      result:
        type: object
        additionalProperties: true

  DiagnosticModel:
    type: object
    required: [error_type, message, severity]
    properties:
      error_type:
        type: string
      line:
        type: integer
        nullable: true
      column:
        type: integer
        nullable: true
      message:
        type: string
      severity:
        type: string

  RunRequest:
    type: object
    required: [code]
    properties:
      code:
        type: string
      language:
        type: string
        enum: [python, c, java]
      attempt_number:
        type: integer
        minimum: 1
      want_full_explanation:
        type: boolean

  RunResultModel:
    type: object
    required:
      - mode
      - syntax_valid
      - function_name
      - diagnostics
      - run_test_summary
      - top_test_cases
    properties:
      mode:
        type: string
        enum: [run]
      syntax_valid:
        type: boolean
      language:
        type: string
        enum: [python, c, java]
      function_name:
        type: string
      diagnostics:
        type: array
        items:
          $ref: '#/models/DiagnosticModel'
      bug_explanation:
        type: string
        nullable: true
      failure_explanation:
        type: string
        nullable: true
      run_test_summary:
        type: object
        additionalProperties: true
      top_test_cases:
        type: array
        items:
          type: object
          additionalProperties: true

  RunResponse:
    type: object
    required: [result]
    properties:
      result:
        $ref: '#/models/RunResultModel'
